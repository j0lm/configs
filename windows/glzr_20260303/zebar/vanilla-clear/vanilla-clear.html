<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Base styles for better consistency across platforms (aka. CSS reset). -->
  <link rel="stylesheet" type="text/css" href="../normalize.css" />

  <!-- Custom styles. -->
  <link rel="stylesheet" type="text/css" href="./styles.css" />

  <!-- Add empty favicon to suppress not found errors. -->
  <link rel="icon" href="data:;" />

  <!-- Allows React to be run buildless via "text/babel" script below. -->
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
    integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo=" crossorigin="anonymous"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from "https://esm.sh/react@18?dev";
    import { createRoot } from "https://esm.sh/react-dom@18/client?dev";
    import * as zebar from "https://esm.sh/zebar@2";

    const providers = zebar.createProviderGroup({
      network: { type: "network" },
      glazewm: { type: 'glazewm' },
      cpu: { type: "cpu" },
      date: { type: "date", formatting: "EEE d MMM tt" },
      battery: { type: "battery" },
      memory: { type: "memory" },
      weather: { type: "weather" },
      keyboard: { type: "keyboard" },
    });

    createRoot(document.getElementById("root")).render(<App />);

    // PowerShell script to detect VPN and active connection
    const networkDetectScript = `
      $vpn = Get-NetAdapter -Name 'ProtonVPN' -ErrorAction SilentlyContinue
      $vpnActive = $vpn -and $vpn.Status -eq 'Up'
      $eth = Get-NetAdapter -Name 'Ethernet' -ErrorAction SilentlyContinue
      $wifi = Get-NetAdapter -Name 'Wi-Fi' -ErrorAction SilentlyContinue
      $activeInterface = if ($eth -and $eth.Status -eq 'Up') { 'Ethernet' } elseif ($wifi -and $wifi.Status -eq 'Up') { 'Wi-Fi' } else { 'None' }
      $ssid = ''
      if ($activeInterface -eq 'Wi-Fi') {
        $ssid = (netsh wlan show interfaces | Select-String 'SSID' | Select-Object -First 1) -replace '.*SSID\\s*:\\s*', ''
      }
      @{ vpnActive = $vpnActive; activeInterface = $activeInterface; ssid = $ssid.Trim() } | ConvertTo-Json -Compress
    `.trim();

    async function getNetworkStatus() {
      try {
        const result = await zebar.shellExec('powershell', ['-NoProfile', '-Command', networkDetectScript]);
        if (result.success && result.stdout) {
          return JSON.parse(result.stdout.trim());
        }
      } catch (e) {
        console.error('Failed to get network status:', e);
      }
      return { vpnActive: false, activeInterface: 'None', ssid: '' };
    }

    // App-specific colors for notifications (extend this later)
    const APP_COLORS = {
      // Example: 'Discord': '#5865F2', 'Slack': '#4A154B', 'Teams': '#6264A7'
      default: '#facc15'  // Yellow for generic notifications
    };

    function getAppColor(processName) {
      return APP_COLORS[processName] || APP_COLORS.default;
    }

    // Read flash state from file
    async function getFlashState() {
      try {
        const result = await zebar.shellExec('powershell', [
          '-NoProfile', '-Command',
          'Get-Content -Path "$env:USERPROFILE\\.glzr\\zebar\\vanilla-clear\\flash-state.json" -Raw'
        ]);
        if (result.success && result.stdout) {
          return JSON.parse(result.stdout.trim());
        }
      } catch (e) {
        console.error('Failed to get flash state:', e);
      }
      return { hasNotifications: false, apps: [], count: 0 };
    }

    function App() {
      const [output, setOutput] = useState(providers.outputMap);
      const [netStatus, setNetStatus] = useState({ vpnActive: false, activeInterface: 'None', ssid: '' });
      const [flashState, setFlashState] = useState({ hasNotifications: false, apps: [], count: 0 });

      useEffect(() => {
        providers.onOutput(() => setOutput(providers.outputMap));
      }, []);

      // Poll for VPN/network status
      useEffect(() => {
        const updateNetStatus = async () => {
          const status = await getNetworkStatus();
          setNetStatus(status);
        };
        updateNetStatus();
        const interval = setInterval(updateNetStatus, 5000);
        return () => clearInterval(interval);
      }, []);

      // Poll for flash/notification state
      useEffect(() => {
        const updateFlashState = async () => {
          const state = await getFlashState();
          setFlashState(state);
        };
        updateFlashState();
        const interval = setInterval(updateFlashState, 1000);
        return () => clearInterval(interval);
      }, []);

      // Get icon based on active interface (Ethernet or Wi-Fi with signal strength)
      function getNetworkIcon(networkOutput) {
        if (netStatus.activeInterface === 'None') {
          return <i className="nf nf-md-wifi_strength_off_outline"></i>;
        }
        if (netStatus.activeInterface === 'Ethernet') {
          return <i className="nf nf-md-ethernet_cable"></i>;
        }
        if (netStatus.activeInterface === 'Wi-Fi') {
          const strength = networkOutput?.defaultGateway?.signalStrength ?? 0;
          if (strength >= 80) return <i className="nf nf-md-wifi_strength_4"></i>;
          if (strength >= 65) return <i className="nf nf-md-wifi_strength_3"></i>;
          if (strength >= 40) return <i className="nf nf-md-wifi_strength_2"></i>;
          if (strength >= 25) return <i className="nf nf-md-wifi_strength_1"></i>;
          return <i className="nf nf-md-wifi_strength_outline"></i>;
        }
        return <i className="nf nf-md-wifi_strength_off_outline"></i>;
      }

      function getNetworkName() {
        if (netStatus.activeInterface === 'Ethernet') return 'Wired';
        if (netStatus.activeInterface === 'Wi-Fi') return netStatus.ssid || 'Wi-Fi';
        return '';
      }

      // Get icon to show for how much of the battery is charged.
      function getBatteryIcon(batteryOutput) {
        if (batteryOutput.chargePercent > 90)
          return <i className="nf nf-fa-battery_4"></i>;
        if (batteryOutput.chargePercent > 70)
          return <i className="nf nf-fa-battery_3"></i>;
        if (batteryOutput.chargePercent > 40)
          return <i className="nf nf-fa-battery_2"></i>;
        if (batteryOutput.chargePercent > 20)
          return <i className="nf nf-fa-battery_1"></i>;
        return <i className="nf nf-fa-battery_0"></i>;
      }

      // Get icon to show for current weather status.
      function getWeatherIcon(weatherOutput) {
        switch (weatherOutput.status) {
          case "clear_day":
            return <i className="nf nf-weather-day_sunny"></i>;
          case "clear_night":
            return <i className="nf nf-weather-night_clear"></i>;
          case "cloudy_day":
            return <i className="nf nf-weather-day_cloudy"></i>;
          case "cloudy_night":
            return <i className="nf nf-weather-night_alt_cloudy"></i>;
          case "light_rain_day":
            return <i className="nf nf-weather-day_sprinkle"></i>;
          case "light_rain_night":
            return <i className="nf nf-weather-night_alt_sprinkle"></i>;
          case "heavy_rain_day":
            return <i className="nf nf-weather-day_rain"></i>;
          case "heavy_rain_night":
            return <i className="nf nf-weather-night_alt_rain"></i>;
          case "snow_day":
            return <i className="nf nf-weather-day_snow"></i>;
          case "snow_night":
            return <i className="nf nf-weather-night_alt_snow"></i>;
          case "thunder_day":
            return <i className="nf nf-weather-day_lightning"></i>;
          case "thunder_night":
            return <i className="nf nf-weather-night_alt_lightning"></i>;
        }
      }

      return (
        <div className="app">
          <div className="left">
            <i className="logo nf nf-fa-windows"></i>
            {output.glazewm && (
              <div className="workspaces">
                {output.glazewm.currentWorkspaces.map(workspace => (
                  <button
                    className={`workspace ${workspace.hasFocus && 'focused'} ${workspace.isDisplayed && 'displayed'}`}
                    onClick={() =>
                      output.glazewm.runCommand(
                        `focus --workspace ${workspace.name}`,
                      )
                    }
                    key={workspace.name}
                  >
                    {workspace.displayName ?? workspace.name}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div className="center">{output.date?.formatted}</div>

          <div className="right">
            {flashState.hasNotifications && (
              <div className="notifications" title={flashState.apps.map(a => a.title || a.process).join(', ')}>
                <span
                  className="notification-dot"
                  style={{ backgroundColor: flashState.apps.length > 0 ? getAppColor(flashState.apps[0].process) : APP_COLORS.default }}
                ></span>
              </div>
            )}

            {output.network && (
              <div className="network">
                {netStatus.vpnActive && <i className="nf nf-md-shield_lock" title="VPN Active"></i>}
                {getNetworkIcon(output.network)}
                {getNetworkName()}
              </div>
            )}

            {output.memory && (
              <div className="memory">
                <i className="nf nf-fae-chip"></i>
                {Math.round(output.memory.usage)}%
              </div>
            )}

            {output.cpu && (
              <div className="cpu">
                <i className="nf nf-oct-cpu"></i>

                {/* Change the text color if the CPU usage is high. */}
                <span className={output.cpu.usage > 85 ? "high-usage" : ""}>
                  {Math.round(output.cpu.usage)}%
                </span>
              </div>
            )}

            {output.battery && (
              <div className="battery">
                {/* Show icon for whether battery is charging. */}
                {output.battery.isCharging && (
                  <i className="nf nf-md-power_plug charging-icon"></i>
                )}
                {getBatteryIcon(output.battery)}
                {Math.round(output.battery.chargePercent)}%
              </div>
            )}

            {output.weather && (
              <div className="weather">
                {getWeatherIcon(output.weather)}
                {Math.round(output.weather.fahrenheitTemp)}°F
              </div>
            )}
          </div>
        </div>
      );
    }
  </script>
</body>

</html>
